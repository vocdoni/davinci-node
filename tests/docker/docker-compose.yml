version: '3.8'

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: >
      anvil
      --host 0.0.0.0
      --port 8545
      --chain-id 1337
      --block-time 2
      --account 0cebebc37477f513cd8f946ffced46e368aa4f9430250ce4507851edbba86b20,10000000000000000000000
    ports:
      - "${GETH_PORT_8545:-8545}:8545"
    volumes:
      - geth:/chain
    working_dir: /chain

volumes:
  geth: {}

