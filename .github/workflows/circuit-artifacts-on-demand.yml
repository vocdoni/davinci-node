name: Compile Circuits

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: circuits-upload-pr-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  upload:
    if: >-
      ${{
        (github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          startsWith(github.event.comment.body, '/upload-circuits')) ||
        (github.event_name == 'pull_request' &&
          github.event.action == 'labeled' &&
          github.event.label.name == 'upload-circuits')
      }}
    runs-on: [self-hosted]
    timeout-minutes: 90
    env:
      LOG_LEVEL: debug
      DAVINCI_ARTIFACTS_DIR: ~/.cache/davinci-artifacts
      GOPATH:     ${{ github.workspace }}/.go
      GOMODCACHE: ${{ github.workspace }}/.go/pkg/mod
      GOCACHE:    ${{ github.workspace }}/.go/cache

    steps:
      - name: Guard and react
        uses: actions/github-script@v7
        id: guard
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const comment = context.payload.comment;
            const issueNumber = context.payload.issue?.number ?? context.payload.pull_request?.number;
            const login = comment?.user?.login ?? context.payload.sender?.login;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: issueNumber,
            });

            if (pr.head.repo.full_name !== `${owner}/${repo}`) {
              core.setFailed('PR is from a fork; refusing to run.');
              return;
            }

            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner,
              repo,
              username: login,
            });

            const allowed = ['admin', 'maintain', 'write'].includes(perm.permission);
            if (!allowed) {
              core.setFailed('User lacks write permissions.');
              return;
            }

            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('pr_number', pr.number.toString());

      - uses: actions/checkout@v6
      - name: Cache circuit artifacts
        uses: actions/cache@v3
        with:
          # Cache the artifact directory so tests don't force re-downloads.
          path: |
            ${{ env.DAVINCI_ARTIFACTS_DIR }}
            ${{ env.GOMODCACHE }}
            ${{ env.GOCACHE }}
          key: ${{ runner.name }}-circuits-go-${{ hashFiles('**/go.sum') }}-v1
          restore-keys: |
            ${{ runner.name }}-circuits-go-
            ${{ runner.os }}-circuits-go-


      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false # we manage cache ourselves

      - name: Debug token permissions
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.pull_request.number;
            core.info(`event=${context.eventName} action=${context.payload.action}`);
            core.info(`actor=${context.actor}`);
            core.info(`pr=${issueNumber}`);
            core.info(`head=${context.payload.pull_request.head.repo.full_name}`);
            try {
              await github.rest.issues.listLabelsOnIssue({
                context.repo.owner,
                context.repo.repo,
                issue_number: issueNumber,
              });
              core.info('listLabelsOnIssue: ok');
            } catch (err) {
              core.warning(`listLabelsOnIssue failed: ${err.status} ${err.message}`);
              if (err.response?.headers) {
                core.info(`headers=${JSON.stringify(err.response.headers)}`);
              }
            }

      - name: Compile and upload circuit artifacts
        env:
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: |
          echo "debugging"
          # go run ./cmd/circuit-compile \
          #   --s3.enabled \
          #   --s3.secret-key="$S3_SECRET_KEY" \
          #   --s3.access-key="$S3_ACCESS_KEY" \
          #   --update-config

      - name: Describe version
        uses: choffmeister/git-describe-semver@main
        id: git-describe-semver
        with:
          fallback: v0.0.0
          prerelease-timestamped: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: davinci-gnark-circuits-artifacts@${{ steps.git-describe-semver.outputs.version }}
          path: |
            config/circuit_artifacts.go
            config/resultsverifier_vkey.sol
            config/statetransition_vkey.sol

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          PR_NUMBER: ${{ steps.guard.outputs.pr_number }}
        with:
          script: |
            const issueNumber = Number(process.env.PR_NUMBER || 0);

            if (issueNumber) {
              try {
                await github.rest.issues.removeLabel({
                  context.repo.owner,
                  context.repo.repo,
                  issue_number: issueNumber,
                  name: 'upload-circuits',
                });
              } catch (err) {
                core.warning(`Failed to remove label: ${err.message}`);
              }
            }

            const conclusion = process.env.JOB_STATUS || 'unknown';
            const repoFullName = `${context.repo.owner}/${context.repo.repo}`;
            const runId = context.runId || process.env.GITHUB_RUN_ID || 'UNKNOWN_RUN_ID';
            const body =
              `Circuit artifacts upload finished. Status: ${conclusion}.\n\n` +
              `Download:\n` +
              `\`\`\`bash\n` +
              `gh run download ${runId} -R ${context.repo.owner}/${context.repo.repo}\n` +
              `\`\`\`\n`;
            await github.rest.issues.createComment({
              context.repo.owner,
              context.repo.repo,
              issue_number: issueNumber,
              body,
            });
